name: Publish Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # To test OIDC publishing without creating a release

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NPM_CONFIG_PROVENANCE: true
